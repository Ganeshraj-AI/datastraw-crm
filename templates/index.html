<!DOCTYPE html>
<html>
<head>
    <title>CRM - Create Ticket</title>
</head>
<body>

    <h1>Create Ticket</h1>

    <form action="/create-ticket" method="post">

        <p>
            <input
                type="text"
                name="customer_name"
                placeholder="Customer Name"
                required
            >
        </p>

        <p>
            <input
                type="email"
                name="customer_email"
                placeholder="Customer Email"
                required
            >
        </p>

        <p>
            <input
                type="text"
                name="subject"
                placeholder="Subject"
                required
            >
        </p>

        <p>
            <textarea
                name="description"
                placeholder="Description"
                rows="5"
                cols="40"
                required
            ></textarea>
        </p>

        <button type="submit">
            Create Ticket
        </button>

    </form>

    <br>

    <a href="/tickets">
        View All Tickets
    </a>

</body>
</html>
